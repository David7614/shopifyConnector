# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a3744137e3cdbe15aa0aef4b4115dd86"
name = "Samba.ai Connector"
application_url = "https://connector.sambaai.pl/app/"
embedded = true
handle = "samba-ai-connector"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_customers,read_orders,read_metaobjects"

[auth]
redirect_urls = [
    "https://connector.sambaai.pl/app/auth/callback", 
    "https://connector.sambaai.pl/app/auth/shopify/callback", 
    "https://connector.sambaai.pl/app/api/auth/callback"
]

[pos]
embedded = false
